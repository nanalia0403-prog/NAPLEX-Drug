<title>NAPLEX Drug Master</title>
<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink)}button,select,input{font:inherit}button{cursor:pointer}.app{max-width:600px;margin:auto;min-height:100vh;padding-bottom:calc(30px + env(safe-area-inset-bottom))}.topbar{position:sticky;top:0;z-index:20;padding:calc(13px + env(safe-area-inset-top)) 16px 13px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 4px 18px rgba(79,70,229,.25)}.toprow{display:flex;justify-content:space-between;align-items:center;gap:12px}.logo{font-size:19px;font-weight:950}.badge{font-size:12px;font-weight:850;background:rgba(255,255,255,.18);padding:7px 10px;border-radius:999px}.screen{display:none;padding:16px}.screen.active{display:block}.hero{background:linear-gradient(145deg,#fff,#f2f0ff);border:1px solid #e5e2ff;border-radius:24px;padding:21px;box-shadow:var(--shadow)}.hero h1{margin:0 0 7px;font-size:27px;line-height:1.12}.hero p{margin:0;color:var(--muted);line-height:1.5}.section-title{margin:20px 2px 10px;color:var(--muted);font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.category{border:1px solid var(--line);background:var(--surface);border-radius:19px;padding:16px 13px;text-align:left;min-height:126px;box-shadow:0 5px 16px rgba(26,34,55,.05)}.category:active,.mode:active,.choice:active{transform:scale(.985)}.category .icon{font-size:28px}.category b{display:block;margin-top:9px;font-size:15px;line-height:1.25}.category small{display:block;margin-top:6px;color:var(--muted)}.category.all{grid-column:1/-1;min-height:auto;display:flex;align-items:center;gap:13px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.stat{background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px;text-align:center}.stat b{display:block;font-size:21px}.stat span{font-size:10px;color:var(--muted)}.head{display:flex;align-items:center;gap:10px;margin-bottom:13px}.back{border:0;background:#fff;border-radius:12px;padding:10px 12px;font-weight:850;box-shadow:0 2px 10px rgba(0,0,0,.06)}.head-title{font-weight:950;flex:1}.chosen{background:var(--soft);color:var(--primary);border-radius:14px;padding:12px 14px;font-weight:900;margin-bottom:13px}.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.mode{border:1px solid var(--line);background:#fff;border-radius:18px;padding:17px 13px;text-align:left;min-height:122px}.mode .emoji{font-size:27px}.mode b{display:block;margin-top:8px}.mode small{color:var(--muted);display:block;margin-top:5px;line-height:1.35}.setup{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}label{display:block;color:var(--muted);font-size:12px;font-weight:900;margin:13px 0 6px}select,input{width:100%;border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px}.primary{width:100%;border:0;border-radius:16px;padding:16px;margin-top:16px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));font-size:17px;font-weight:950}.progress-wrap{flex:1}.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:800;margin-bottom:6px}.progress{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--primary2));transition:width .25s}.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:21px;box-shadow:var(--shadow)}.prompt{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:950}.question{font-size:29px;line-height:1.16;font-weight:950;margin:12px 0 8px;word-break:break-word}.hint{color:var(--muted);font-size:13px}.speak{margin-top:14px;border:0;border-radius:13px;padding:10px 13px;background:var(--soft);color:var(--primary);font-weight:900}.choices{display:grid;gap:10px;margin-top:16px}.choice{width:100%;min-height:58px;border:2px solid var(--line);background:#fff;border-radius:16px;padding:14px 15px;text-align:left;font-weight:850;line-height:1.35}.choice.correct{border-color:var(--good);background:#ecfdf3;color:#14532d}.choice.wrong{border-color:var(--bad);background:#fef2f2;color:#7f1d1d}.choice:disabled{opacity:1}.feedback{display:none;margin-top:14px;padding:14px;border-radius:16px;font-weight:850;line-height:1.45}.feedback.show{display:block}.feedback.good{background:#ecfdf3;color:#166534}.feedback.bad{background:#fef2f2;color:#991b1b}.next{display:none}.next.show{display:block}.result{text-align:center}.trophy{font-size:60px}.scorebig{font-size:47px;font-weight:950;color:var(--primary)}.review-tools{display:grid;grid-template-columns:1fr auto;gap:9px;margin-bottom:12px}.review-list{display:grid;gap:9px}.review{background:#fff;border:1px solid var(--line);border-radius:15px;padding:13px}.review b{font-size:16px}.review small{display:block;color:var(--muted);margin-top:5px;line-height:1.45}.empty{text-align:center;color:var(--muted);padding:30px 8px}@media(min-width:760px){.app{max-width:760px}.category-grid{grid-template-columns:repeat(3,1fr)}.category.all{grid-column:span 3}.screen{padding:24px}.question{font-size:35px}}

<body>
<div class="app">
<header class="topbar"><div class="toprow"><div class="logo">NAPLEX Drug Master</div><div class="badge" id="streakBadge">🔥 0 day streak</div></div></header>
<main id="categories" class="screen active">
<section class="hero"><h1>Choose a Drug Category</h1><p>Choose a category such as CNS, Cardiovascular, or Endocrine, then select a quiz mode.</p></section>
<div class="section-title">Drug Categories</div><section class="category-grid" id="categoryGrid"></section>
<div class="section-title">Today's Progress</div><section class="stats"><div class="stat"><b id="todayAnswered">0</b><span>Answered</span></div><div class="stat"><b id="todayCorrect">0</b><span>Correct</span></div><div class="stat"><b id="masteredTotal">0</b><span>Mastered</span></div></section>
</main>
<main id="modes" class="screen"><div class="head"><button class="back" id="backCategories">← Categories</button><div class="head-title">Choose a Game Mode</div></div><div class="chosen" id="chosenCategory"></div><section class="mode-grid"><button class="mode" data-mode="brand-generic"><div class="emoji">💊</div><b>Brand → Generic</b><small>Match the brand name to its generic name</small></button><button class="mode" data-mode="generic-brand"><div class="emoji">🔄</div><b>Generic → Brand</b><small>Match the generic name to its brand name</small></button><button class="mode" data-mode="brand-disease"><div class="emoji">🩺</div><b>Brand → Disease</b><small>Match the brand name to its indication</small></button><button class="mode" data-mode="mixed"><div class="emoji">🎲</div><b>Mixed Challenge</b><small>Random mix of all three question types</small></button><button class="mode" id="wrongMode"><div class="emoji">❌</div><b>Review Wrong Answers</b><small id="wrongCountText">0 wrong answers</small></button><button class="mode" id="reviewMode"><div class="emoji">📚</div><b>Drug Library</b><small>Search drugs and hear pronunciation</small></button></section></main>
<main id="setupScreen" class="screen"><div class="head"><button class="back" id="backModes">← Modes</button><div class="head-title">Set Up Your Quiz</div></div><section class="setup"><div class="prompt">Selected mode</div><div class="question" id="setupMode" style="font-size:23px"></div><label for="questionCount">Number of Questions</label><select id="questionCount"><option value="10">10 Questions</option><option value="20" selected>20 Questions</option><option value="30">30 Questions</option><option value="9999">All Drugs in This Category</option></select><label for="speechRate">Pronunciation Speed</label><select id="speechRate"><option value="0.7">Slow</option><option value="0.85" selected>Moderately Slow</option><option value="1">Normal</option></select><button class="primary" id="startBtn">Start Quiz</button></section></main>
<main id="game" class="screen"><div class="head"><button class="back" id="exitGame">✕</button><div class="progress-wrap"><div class="progress-meta"><span id="qCounter"></span><span id="liveScore"></span></div><div class="progress"><div class="bar" id="bar"></div></div></div></div><section class="card"><div class="prompt" id="promptLabel"></div><div class="question" id="questionText"></div><div class="hint" id="subhint"></div><button class="speak" id="speakBtn">🔊 Play pronunciation</button><div class="choices" id="choices"></div><div class="feedback" id="feedback" aria-live="polite"></div><button class="primary next" id="nextBtn">Next Question</button></section></main>
<main id="result" class="screen"><section class="card result"><div class="trophy">🏆</div><h2>Quiz Complete</h2><div class="scorebig" id="resultScore"></div><p class="hint" id="resultText"></p><button class="primary" id="repeatBtn">Play Again</button><button class="back" style="width:100%;margin-top:10px" id="homeBtn">Back to Categories</button></section></main>
<main id="reviewScreen" class="screen"><div class="head"><button class="back" id="reviewBack">← Modes</button><div class="head-title" id="reviewTitle">Drug Library</div></div><div class="review-tools"><input id="searchBox" type="search" placeholder="Search brand, generic, or indication"><button class="back" id="clearSearch">Clear</button></div><div class="review-list" id="reviewList"></div></main>
</div>

const $=id=>document.getElementById(id);const screens=[...document.querySelectorAll('.screen')];
let categoryKey='CNS',mode='mixed',questions=[],idx=0,correct=0,answered=false,wrongThisRound=[];
const LABELS={"brand-generic":["Brand → Generic","Choose the generic name","brand","generic"],"generic-brand":["Generic → Brand","Choose the brand name","generic","brand"],"brand-disease":["Brand → Disease","Choose the indication","brand","disease"]};
function show(id){screens.forEach(s=>s.classList.toggle('active',s.id===id));scrollTo(0,0)}function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function currentItems(){if(categoryKey==='ALL')return Object.values(CATEGORIES).flatMap(c=>c.items);return CATEGORIES[categoryKey].items}function categoryTitle(){return categoryKey==='ALL'?'All Categories':CATEGORIES[categoryKey].title}
function renderCategories(){const grid=$('categoryGrid');grid.innerHTML='';const all=document.createElement('button');all.className='category all';all.innerHTML='<div class="icon">🌟</div><div><b>All Categories</b><small>'+Object.values(CATEGORIES).reduce((n,c)=>n+c.items.length,0)+'  drugs</small></div>';all.addEventListener('click',()=>openCategory('ALL'));grid.appendChild(all);Object.entries(CATEGORIES).forEach(([key,c])=>{const b=document.createElement('button');b.className='category';b.innerHTML=`<div class="icon">${c.icon}</div><b>${c.title}</b><small>${c.items.length}  drugs</small>`;b.addEventListener('click',()=>openCategory(key));grid.appendChild(b)})}
function openCategory(key){categoryKey=key;$('chosenCategory').textContent=(key==='ALL'?'🌟':CATEGORIES[key].icon)+' '+categoryTitle()+' · '+currentItems().length+' drugs';refreshWrongCount();show('modes')}
function openSetup(m){mode=m;$('setupMode').textContent=m==='mixed'?'Mixed Challenge':LABELS[m][0];show('setupScreen')}
function buildQuestion(item,m){const use=m==='mixed'?shuffle(Object.keys(LABELS))[0]:m;const [name,prompt,qKey,aKey]=LABELS[use];const items=currentItems();const answer=item[aKey];const pool=[...new Set(items.map(x=>x[aKey]).filter(x=>x!==answer))];let distractors=shuffle(pool).slice(0,3);if(distractors.length<3){const global=Object.values(CATEGORIES).flatMap(c=>c.items);const extras=[...new Set(global.map(x=>x[aKey]).filter(x=>x!==answer&&!distractors.includes(x)))];distractors=distractors.concat(shuffle(extras).slice(0,3-distractors.length))}return{item,mode:use,name,prompt,question:item[qKey],answer,choices:shuffle([answer,...distractors])}}
function startGame(customItems=null){let base=customItems||shuffle(currentItems());let count=Math.min(Number($('questionCount').value),base.length);questions=base.slice(0,count).map(x=>buildQuestion(x,mode));idx=0;correct=0;answered=false;wrongThisRound=[];show('game');renderQuestion()}
function renderQuestion(){answered=false;const q=questions[idx];$('qCounter').textContent=`${idx+1} / ${questions.length}`;$('liveScore').textContent=`${correct} correct`;$('bar').style.width=`${idx/questions.length*100}%`;$('promptLabel').textContent=q.prompt;$('questionText').textContent=q.question;$('subhint').textContent=q.name;$('feedback').className='feedback';$('feedback').textContent='';$('nextBtn').className='primary next';const box=$('choices');box.innerHTML='';q.choices.forEach(c=>{const b=document.createElement('button');b.className='choice';b.textContent=c;b.addEventListener('click',()=>choose(b,c));box.appendChild(b)});setTimeout(()=>speak(q.question),180)}
function choose(button,choice){if(answered)return;answered=true;const q=questions[idx];document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add('correct')});const ok=choice===q.answer;if(ok){correct++;$('feedback').className='feedback show good';$('feedback').textContent=`✓ Correct! ${q.item.brand} — ${q.item.generic} — ${q.item.disease}`;markMastered(q.item.id)}else{button.classList.add('wrong');$('feedback').className='feedback show bad';$('feedback').textContent=`✗ Correct answer: ${q.answer}`;wrongThisRound.push(q.item.id);saveWrong(q.item.id)}incrementDaily(ok);speak(`${q.item.brand}. ${q.item.generic}. ${q.item.disease}.`);$('liveScore').textContent=`${correct} correct`;$('nextBtn').textContent=idx===questions.length-1?'View Results':'Next Question';$('nextBtn').className='primary next show'}
function nextQuestion(){if(idx<questions.length-1){idx++;renderQuestion()}else finishGame()}function finishGame(){const pct=Math.round(correct/questions.length*100);$('resultScore').textContent=pct+'%';$('resultText').textContent=`You answered ${correct} of ${questions.length} correctly, with ${wrongThisRound.length} wrong answer(s).`;updateStreak();show('result')}
function speak(text){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=Number($('speechRate').value||.85);speechSynthesis.speak(u)}
function wrongKey(){return 'naplex_full_wrong'}function masteryKey(){return 'naplex_full_mastery'}function getWrongIds(){return JSON.parse(localStorage.getItem(wrongKey())||'[]')}function saveWrong(id){const s=new Set(getWrongIds());s.add(id);localStorage.setItem(wrongKey(),JSON.stringify([...s]))}function removeWrong(id){localStorage.setItem(wrongKey(),JSON.stringify(getWrongIds().filter(x=>x!==id)))}function markMastered(id){const o=JSON.parse(localStorage.getItem(masteryKey())||'{}');o[id]=(o[id]||0)+1;localStorage.setItem(masteryKey(),JSON.stringify(o));if(o[id]>=3)removeWrong(id)}
function startWrongOnly(){const allowed=new Set(currentItems().map(x=>x.id));const items=Object.values(CATEGORIES).flatMap(c=>c.items).filter(x=>allowed.has(x.id)&&getWrongIds().includes(x.id));if(!items.length){alert('There are no wrong answers in this category yet.');return}mode='mixed';$('questionCount').value=String(items.length<=10?10:Math.min(20,items.length));startGame(shuffle(items))}function refreshWrongCount(){const allowed=new Set(currentItems().map(x=>x.id));$('wrongCountText').textContent=`${getWrongIds().filter(id=>allowed.has(id)).length} wrong answers`}
function incrementDaily(ok){const t=new Date().toISOString().slice(0,10);let d=JSON.parse(localStorage.getItem('naplex_full_daily')||'{}');if(d.date!==t)d={date:t,answered:0,correct:0};d.answered++;if(ok)d.correct++;localStorage.setItem('naplex_full_daily',JSON.stringify(d))}function updateStreak(){const now=new Date(),t=now.toISOString().slice(0,10);let s=JSON.parse(localStorage.getItem('naplex_full_streak')||'{"count":0,"last":""}');if(s.last!==t){const y=new Date(now);y.setDate(y.getDate()-1);s.count=s.last===y.toISOString().slice(0,10)?s.count+1:1;s.last=t;localStorage.setItem('naplex_full_streak',JSON.stringify(s))}}
function refreshHome(){const t=new Date().toISOString().slice(0,10),d=JSON.parse(localStorage.getItem('naplex_full_daily')||'{}');$('todayAnswered').textContent=d.date===t?(d.answered||0):0;$('todayCorrect').textContent=d.date===t?(d.correct||0):0;const m=JSON.parse(localStorage.getItem(masteryKey())||'{}');$('masteredTotal').textContent=Object.values(m).filter(v=>v>=3).length;const s=JSON.parse(localStorage.getItem('naplex_full_streak')||'{"count":0}');$('streakBadge').textContent=`🔥 ${s.count||0} day streak`}
function showReview(){show('reviewScreen');$('reviewTitle').textContent=categoryTitle()+'  Drug Library';$('searchBox').value='';renderReview('')}function renderReview(q){const list=$('reviewList'),term=q.trim().toLowerCase();const items=currentItems().filter(x=>!term||[x.brand,x.generic,x.disease].some(v=>v.toLowerCase().includes(term)));list.innerHTML='';if(!items.length){list.innerHTML='<div class="empty">No matching drugs found</div>';return}items.forEach(x=>{const d=document.createElement('button');d.className='review';d.style.textAlign='left';d.innerHTML=`<b>${x.brand}</b><small>Generic: ${x.generic}<br>Indication: ${x.disease}</small>`;d.addEventListener('click',()=>speak(`${x.brand}. ${x.generic}. ${x.disease}.`));list.appendChild(d)})}
$('backCategories').addEventListener('click',()=>{show('categories');refreshHome()});$('backModes').addEventListener('click',()=>show('modes'));document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>openSetup(b.dataset.mode)));$('wrongMode').addEventListener('click',startWrongOnly);$('reviewMode').addEventListener('click',showReview);$('startBtn').addEventListener('click',()=>startGame());$('exitGame').addEventListener('click',()=>{if(confirm('Exit this quiz?'))show('modes')});$('speakBtn').addEventListener('click',()=>speak(questions[idx].question));$('nextBtn').addEventListener('click',nextQuestion);$('repeatBtn').addEventListener('click',()=>startGame());$('homeBtn').addEventListener('click',()=>{show('categories');refreshHome()});$('reviewBack').addEventListener('click',()=>show('modes'));$('searchBox').addEventListener('input',e=>renderReview(e.target.value));$('clearSearch').addEventListener('click',()=>{$('searchBox').value='';renderReview('')});
renderCategories();refreshHome();
</script>
